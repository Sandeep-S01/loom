services:
  postgres:
    image: postgres:16-alpine
    container_name: clm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clm
      POSTGRES_PASSWORD: clm_dev_password
      POSTGRES_DB: clm_tool
    volumes:
      - clm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm -d clm_tool"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clm-redis
    ports:
      - "6379:6379"
    volumes:
      - clm_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  clm_pgdata:
  clm_redisdata:
