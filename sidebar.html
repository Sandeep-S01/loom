<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Component</title>
<style>
  /* ============================================
     THEME TOKENS — change these to match your brand
     ============================================ */
  :root {
    --sb-bg: #191818;
    --sb-bg-elevated: #232221;
    --sb-bg-hover: #2b2a29;
    --sb-bg-active: #33322f;
    --sb-border: #2f2e2c;
    --sb-text: #e8e6e1;
    --sb-text-muted: #8c8a85;
    --sb-text-faint: #635f5a;
    --sb-accent: #d97757;        /* swap for your brand accent */
    --sb-accent-text: #1a1918;
    --sb-radius-sm: 6px;
    --sb-radius-md: 10px;
    --sb-width-expanded: 260px;
    --sb-width-collapsed: 68px;
    --sb-transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
    --sb-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sb-font);
    background: #101010;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ============================================
     SIDEBAR SHELL
     ============================================ */
  .sidebar {
    width: var(--sb-width-expanded);
    background: var(--sb-bg);
    border-right: 1px solid var(--sb-border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: width var(--sb-transition);
    flex-shrink: 0;
    position: relative;
  }

  .sidebar.collapsed {
    width: var(--sb-width-collapsed);
  }

  /* ============================================
     TOP: brand + collapse toggle
     ============================================ */
  .sb-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 12px;
    flex-shrink: 0;
  }

  .sb-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    overflow: hidden;
  }

  .sb-brand-mark {
    width: 28px;
    height: 28px;
    border-radius: var(--sb-radius-sm);
    background: var(--sb-accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: var(--sb-accent-text);
    font-size: 14px;
  }

  .sb-brand-name {
    color: var(--sb-text);
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 120ms ease;
  }

  .sidebar.collapsed .sb-brand-name { opacity: 0; width: 0; }

  .sb-toggle {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--sb-text-muted);
    border-radius: var(--sb-radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 120ms ease, color 120ms ease;
  }

  .sb-toggle:hover {
    background: var(--sb-bg-hover);
    color: var(--sb-text);
  }

  .sb-toggle svg {
    width: 16px;
    height: 16px;
    transition: transform var(--sb-transition);
  }

  .sidebar.collapsed .sb-toggle svg { transform: rotate(180deg); }

  /* ============================================
     PRIMARY ACTION
     ============================================ */
  .sb-primary {
    margin: 4px 12px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--sb-radius-sm);
    background: var(--sb-bg-elevated);
    border: 1px solid var(--sb-border);
    color: var(--sb-text);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
    white-space: nowrap;
    overflow: hidden;
  }

  .sb-primary:hover {
    background: var(--sb-bg-hover);
    border-color: var(--sb-text-faint);
  }

  .sb-primary svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--sb-accent); }
  .sidebar.collapsed .sb-primary { justify-content: center; padding: 9px; }
  .sidebar.collapsed .sb-primary span { display: none; }

  /* ============================================
     SEARCH
     ============================================ */
  .sb-search {
    margin: 0 12px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 9px;
    border-radius: var(--sb-radius-sm);
    color: var(--sb-text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: background 120ms ease;
  }

  .sb-search:hover { background: var(--sb-bg-hover); }
  .sb-search svg { width: 15px; height: 15px; flex-shrink: 0; }
  .sidebar.collapsed .sb-search { justify-content: center; }
  .sidebar.collapsed .sb-search span { display: none; }

  /* ============================================
     SCROLLABLE NAV SECTIONS
     ============================================ */
  .sb-nav {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 8px;
  }

  .sb-nav::-webkit-scrollbar { width: 6px; }
  .sb-nav::-webkit-scrollbar-thumb { background: var(--sb-border); border-radius: 3px; }

  .sb-section-label {
    padding: 12px 20px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--sb-text-faint);
    white-space: nowrap;
  }

  .sidebar.collapsed .sb-section-label { display: none; }

  .sb-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 1px 8px;
    padding: 7px 10px;
    border-radius: var(--sb-radius-sm);
    color: var(--sb-text-muted);
    font-size: 13.5px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    position: relative;
    transition: background 120ms ease, color 120ms ease;
  }

  .sb-item:hover { background: var(--sb-bg-hover); color: var(--sb-text); }

  .sb-item.active {
    background: var(--sb-bg-active);
    color: var(--sb-text);
  }

  .sb-item.active::before {
    content: "";
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 16px;
    border-radius: 2px;
    background: var(--sb-accent);
  }

  .sb-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sb-item span {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar.collapsed .sb-item { justify-content: center; padding: 8px; }
  .sidebar.collapsed .sb-item span { display: none; }
  .sidebar.collapsed .sb-item.active::before { display: none; }

  /* ============================================
     FOOTER: user
     ============================================ */
  .sb-footer {
    border-top: 1px solid var(--sb-border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    flex-shrink: 0;
    border-radius: var(--sb-radius-sm);
    margin: 0 6px 6px;
    transition: background 120ms ease;
  }

  .sb-footer:hover { background: var(--sb-bg-hover); }

  .sb-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--sb-accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--sb-accent-text);
    flex-shrink: 0;
  }

  .sb-footer-meta {
    overflow: hidden;
    white-space: nowrap;
  }

  .sb-footer-name { font-size: 13px; color: var(--sb-text); font-weight: 500; }
  .sb-footer-sub { font-size: 11.5px; color: var(--sb-text-faint); }

  .sidebar.collapsed .sb-footer-meta { display: none; }
  .sidebar.collapsed .sb-footer { justify-content: center; }

  /* tooltip for collapsed state */
  .sb-tooltip {
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    background: var(--sb-bg-elevated);
    border: 1px solid var(--sb-border);
    color: var(--sb-text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: var(--sb-radius-sm);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 120ms ease;
    z-index: 10;
  }

  .sidebar.collapsed .sb-item:hover .sb-tooltip { opacity: 1; }

  /* ============================================
     DEMO CONTENT (remove in real integration)
     ============================================ */
  .demo-main {
    flex: 1;
    background: #101010;
    color: #8c8a85;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sb-font);
    font-size: 13px;
  }

  @media (prefers-reduced-motion: reduce) {
    .sidebar, .sb-toggle svg, .sb-brand-name { transition: none; }
  }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-brand-mark">N</div>
      <div class="sb-brand-name">Nivora</div>
    </div>
    <button class="sb-toggle" id="toggleBtn" aria-label="Collapse sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </div>

  <div class="sb-primary" tabindex="0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    <span>New chat</span>
  </div>

  <div class="sb-search" tabindex="0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <span>Search</span>
  </div>

  <div class="sb-nav">
    <div class="sb-section-label">Projects</div>

    <div class="sb-item active" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span>Overview</span>
      <div class="sb-tooltip">Overview</div>
    </div>

    <div class="sb-item" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M18 9l-5 5-4-4-4 4"/></svg>
      <span>Analytics</span>
      <div class="sb-tooltip">Analytics</div>
    </div>

    <div class="sb-item" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      <span>Deployments</span>
      <div class="sb-tooltip">Deployments</div>
    </div>

    <div class="sb-section-label">Recent</div>

    <div class="sb-item" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span>Pricing strategy notes</span>
      <div class="sb-tooltip">Pricing strategy notes</div>
    </div>

    <div class="sb-item" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span>Landing page copy v3</span>
      <div class="sb-tooltip">Landing page copy v3</div>
    </div>

    <div class="sb-item" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span>Waitlist onboarding flow</span>
      <div class="sb-tooltip">Waitlist onboarding flow</div>
    </div>
  </div>

  <div class="sb-footer" tabindex="0">
    <div class="sb-avatar">S</div>
    <div class="sb-footer-meta">
      <div class="sb-footer-name">Sandeep</div>
      <div class="sb-footer-sub">Free plan</div>
    </div>
  </div>
</nav>

<div class="demo-main">Main content area →</div>

<script>
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('toggleBtn');

  // Restore state (in a real app, persist via your own backend/user prefs —
  // localStorage is avoided here since it isn't reliable in all embed contexts)
  let collapsed = false;

  toggleBtn.addEventListener('click', () => {
    collapsed = !collapsed;
    sidebar.classList.toggle('collapsed', collapsed);
    toggleBtn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
  });

  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    });
  });
</script>

</body>
</html>
