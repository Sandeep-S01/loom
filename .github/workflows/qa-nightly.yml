name: QA Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1-5"

permissions:
  contents: read

jobs:
  cross-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_CROSS_BROWSER: "true"
      E2E_PRODUCTION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck:e2e
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-browser-evidence
          path: |
            playwright-report/
            test-results/
          retention-days: 14
